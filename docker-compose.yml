# ─── docker-compose.yml ───────────────────────────────────────────────────────
# Mục đích: Dựng PostgreSQL đóng vai "ERP Source Database"
# Chạy:  docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:
  erp_postgres:
    image: postgres:16-alpine
    container_name: erp_source_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       erp_source
      POSTGRES_USER:     erp_user
      POSTGRES_PASSWORD: 123456
    ports:
      - "5433:5432"       # dùng 5433 để tránh xung đột port local
    volumes:
      - erp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d erp_source"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  erp_pgdata:
